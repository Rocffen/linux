<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Linux命令学习助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Consolas', 'Monaco', monospace;
            color: #fff;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2rem;
            color: #00d9ff;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #aaa;
            font-size: 0.9rem;
        }
        
        .search-bar {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #00d9ff;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.3s;
        }
        
        .search-bar:focus {
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
        }
        
        .search-bar::placeholder {
            color: #666;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        
        .tab {
            padding: 8px 16px;
            border: 2px solid transparent;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        
        .tab.active {
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            border-color: #00d9ff;
            color: #000;
        }
        
        .tab:hover {
            background: rgba(0, 217, 255, 0.3);
        }
        
        .command-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .command-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .command-card:hover {
            transform: translateY(-3px);
            border-color: #00d9ff;
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.2);
        }
        
        .command-card .name {
            font-size: 1.2rem;
            color: #00d9ff;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .command-card .desc {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 10px;
        }
        
        .command-card .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        
        .command-card .tag {
            padding: 3px 8px;
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border-radius: 10px;
            font-size: 0.7rem;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            display: none;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1a2e;
            border: 1px solid #00d9ff;
            border-radius: 15px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }
        
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid rgba(0, 217, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header .title {
            font-size: 1.5rem;
            color: #00d9ff;
        }
        
        .close-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 0, 0, 0.2);
            border: none;
            color: #ff4444;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .modal-body {
            padding: 20px;
        }
        
        .section {
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 1rem;
            color: #00ff88;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .section-title::before {
            content: '▸';
            color: #00d9ff;
        }
        
        .usage {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            font-family: 'Consolas', monospace;
            font-size: 0.9rem;
            color: #00ff88;
            margin-bottom: 10px;
        }
        
        .description {
            color: #ddd;
            line-height: 1.6;
        }
        
        .example {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            font-family: 'Consolas', monospace;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }
        
        .example .prompt {
            color: #00d9ff;
        }
        
        .example .command {
            color: #fff;
        }
        
        .example .output {
            color: #00ff88;
            margin-top: 5px;
        }
        
        .quiz-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .quiz-question {
            font-size: 1rem;
            color: #ddd;
            margin-bottom: 15px;
        }
        
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .quiz-option {
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }
        
        .quiz-option:hover {
            background: rgba(0, 217, 255, 0.2);
            border-color: rgba(0, 217, 255, 0.5);
        }
        
        .quiz-option.correct {
            background: rgba(0, 255, 136, 0.2);
            border-color: #00ff88;
            color: #00ff88;
        }
        
        .quiz-option.wrong {
            background: rgba(255, 0, 0, 0.2);
            border-color: #ff4444;
            color: #ff4444;
        }
        
        .quiz-feedback {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        
        .quiz-feedback.correct {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            display: block;
        }
        
        .quiz-feedback.wrong {
            background: rgba(255, 0, 0, 0.2);
            color: #ff4444;
            display: block;
        }
        
        .favorite-btn {
            position: absolute;
            top: 20px;
            right: 60px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .favorite-btn:hover {
            transform: scale(1.2);
        }
        
        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: rgba(0, 217, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5rem;
            color: #00d9ff;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: #aaa;
        }
        
        @media (max-width: 768px) {
            .command-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                margin: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐧 Linux命令学习助手</h1>
            <p>掌握常用运维命令，成为Linux高手！</p>
        </div>
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalCommands">0</div>
                <div class="stat-label">命令总数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="favCount">0</div>
                <div class="stat-label">收藏数量</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="quizScore">0</div>
                <div class="stat-label">测验得分</div>
            </div>
        </div>
        
        <input type="text" class="search-bar" id="searchBar" placeholder="搜索命令...">
        
        <div class="tabs" id="categoryTabs">
            <div class="tab active" data-category="all">全部</div>
            <div class="tab" data-category="files">文件操作</div>
            <div class="tab" data-category="system">系统管理</div>
            <div class="tab" data-category="network">网络管理</div>
            <div class="tab" data-category="process">进程管理</div>
            <div class="tab" data-category="package">软件包管理</div>
            <div class="tab" data-category="script">脚本编程</div>
            <div class="tab" data-category="tools">工具命令</div>
            <div class="tab" data-category="compress">压缩工具</div>
        </div>
        
        <div class="command-grid" id="commandGrid"></div>
        
        <div class="modal" id="commandModal">
            <div class="modal-content">
                <div class="modal-header">
                    <span class="title" id="modalTitle"></span>
                    <span class="favorite-btn" id="favoriteBtn" onclick="toggleFavorite()">⭐</span>
                    <button class="close-btn" onclick="closeModal()">✕</button>
                </div>
                <div class="modal-body" id="modalBody"></div>
            </div>
        </div>
    </div>

    <script>
        const commands = [
            {
                name: 'ls',
                description: '列出目录内容',
                category: 'files',
                usage: 'ls [选项] [目录]',
                details: '列出指定目录下的文件和文件夹。如果没有指定目录，则列出当前目录。',
                examples: [
                    { command: 'ls', output: '列出当前目录内容' },
                    { command: 'ls -l', output: '以长格式显示，包含权限、所有者、大小等信息' },
                    { command: 'ls -la', output: '显示所有文件，包括隐藏文件(以.开头的文件)' },
                    { command: 'ls -lh', output: '以人类可读的格式显示文件大小' }
                ],
                quiz: {
                    question: '要查看目录中所有文件（包括隐藏文件），应该使用哪个命令？',
                    options: ['ls -a', 'ls -l', 'ls -h', 'ls -r'],
                    answer: 0,
                    explanation: '-a 参数表示显示所有文件，包括以点(.)开头的隐藏文件'
                }
            },
            {
                name: 'cd',
                description: '切换当前目录',
                category: 'files',
                usage: 'cd [目录路径]',
                details: '改变当前工作目录到指定路径。使用 cd ~ 或 cd 可回到用户主目录。',
                examples: [
                    { command: 'cd /home/user', output: '切换到/home/user目录' },
                    { command: 'cd ..', output: '切换到上级目录' },
                    { command: 'cd ~', output: '切换到用户主目录' },
                    { command: 'cd -', output: '切换到上一次所在的目录' }
                ],
                quiz: {
                    question: '如何快速回到用户主目录？',
                    options: ['cd /', 'cd ~', 'cd home', 'cd .'],
                    answer: 1,
                    explanation: '~ 是用户主目录的快捷表示法'
                }
            },
            {
                name: 'cp',
                description: '复制文件或目录',
                category: 'files',
                usage: 'cp [选项] 源文件 目标文件',
                details: '将源文件复制到目标位置。使用 -r 参数可以递归复制目录。',
                examples: [
                    { command: 'cp file.txt backup.txt', output: '复制file.txt为backup.txt' },
                    { command: 'cp -r dir1 dir2', output: '递归复制dir1目录到dir2' },
                    { command: 'cp -i file.txt backup.txt', output: '复制前询问确认' },
                    { command: 'cp -v file.txt /tmp/', output: '显示复制过程' }
                ],
                quiz: {
                    question: '要复制整个目录及其内容，需要使用哪个参数？',
                    options: ['-f', '-r', '-v', '-i'],
                    answer: 1,
                    explanation: '-r 参数表示递归复制目录及其所有内容'
                }
            },
            {
                name: 'mv',
                description: '移动或重命名文件',
                category: 'files',
                usage: 'mv [选项] 源文件 目标文件',
                details: '将文件移动到新位置，或重命名文件。',
                examples: [
                    { command: 'mv old.txt new.txt', output: '将old.txt重命名为new.txt' },
                    { command: 'mv file.txt /tmp/', output: '将file.txt移动到/tmp目录' },
                    { command: 'mv -i file.txt backup/', output: '移动前询问确认' }
                ],
                quiz: {
                    question: '以下哪个命令可以将文件重命名？',
                    options: ['cp', 'rm', 'mv', 'ln'],
                    answer: 2,
                    explanation: 'mv命令既可以移动文件，也可以重命名文件'
                }
            },
            {
                name: 'rm',
                description: '删除文件或目录',
                category: 'files',
                usage: 'rm [选项] 文件',
                details: '删除指定的文件或目录。使用 -r 参数递归删除目录及其内容。',
                examples: [
                    { command: 'rm file.txt', output: '删除file.txt' },
                    { command: 'rm -r dir/', output: '递归删除dir目录及其内容' },
                    { command: 'rm -rf dir/', output: '强制递归删除，不询问确认' },
                    { command: 'rm -i file.txt', output: '删除前询问确认' }
                ],
                quiz: {
                    question: '强制删除目录且不询问确认的命令是？',
                    options: ['rm dir/', 'rm -r dir/', 'rm -rf dir/', 'rm -i dir/'],
                    answer: 2,
                    explanation: '-rf 参数组合表示递归(-r)且强制(-f)删除'
                }
            },
            {
                name: 'mkdir',
                description: '创建目录',
                category: 'files',
                usage: 'mkdir [选项] 目录名',
                details: '创建一个新目录。使用 -p 参数可以创建嵌套目录。',
                examples: [
                    { command: 'mkdir newdir', output: '创建newdir目录' },
                    { command: 'mkdir -p dir1/dir2/dir3', output: '递归创建嵌套目录' },
                    { command: 'mkdir -m 755 newdir', output: '创建目录并设置权限' }
                ],
                quiz: {
                    question: '要创建嵌套目录 /a/b/c，应该使用哪个命令？',
                    options: ['mkdir /a/b/c', 'mkdir -p /a/b/c', 'mkdir -r /a/b/c', 'mkdir --nested /a/b/c'],
                    answer: 1,
                    explanation: '-p 参数可以创建不存在的父目录'
                }
            },
            {
                name: 'cat',
                description: '查看文件内容',
                category: 'files',
                usage: 'cat [选项] 文件',
                details: '显示文件内容到标准输出。可用于查看小文件。',
                examples: [
                    { command: 'cat file.txt', output: '显示file.txt内容' },
                    { command: 'cat -n file.txt', output: '显示行号' },
                    { command: 'cat file1.txt file2.txt', output: '合并显示多个文件' },
                    { command: 'cat > newfile.txt', output: '创建新文件并输入内容' }
                ],
                quiz: {
                    question: '如何在查看文件时显示行号？',
                    options: ['cat -l', 'cat -n', 'cat --number', 'cat -p'],
                    answer: 1,
                    explanation: '-n 参数可以在每行前面显示行号'
                }
            },
            {
                name: 'grep',
                description: '搜索文件内容',
                category: 'files',
                usage: 'grep [选项] 模式 文件',
                details: '在文件中搜索匹配指定模式的行。支持正则表达式。',
                examples: [
                    { command: 'grep "pattern" file.txt', output: '搜索包含pattern的行' },
                    { command: 'grep -i "pattern" file.txt', output: '忽略大小写搜索' },
                    { command: 'grep -r "pattern" dir/', output: '递归搜索目录' },
                    { command: 'grep -n "pattern" file.txt', output: '显示匹配行的行号' }
                ],
                quiz: {
                    question: '要忽略大小写进行搜索，应该使用哪个参数？',
                    options: ['-r', '-i', '-n', '-v'],
                    answer: 1,
                    explanation: '-i 参数表示忽略大小写(ignore case)'
                }
            },
            {
                name: 'chmod',
                description: '修改文件权限',
                category: 'system',
                usage: 'chmod [权限] 文件',
                details: '修改文件或目录的权限。权限可以用数字(如755)或符号(如u+x)表示。',
                examples: [
                    { command: 'chmod 755 file.sh', output: '设置权限为rwxr-xr-x' },
                    { command: 'chmod +x script.sh', output: '添加可执行权限' },
                    { command: 'chmod -R 755 dir/', output: '递归修改目录权限' },
                    { command: 'chmod u=rwx,g=rx,o=r file.txt', output: '符号方式设置权限' }
                ],
                quiz: {
                    question: '数字权限755表示什么？',
                    options: ['所有人都有全部权限', '所有者rwx，组和其他rx', '所有人只读', '仅所有者有权限'],
                    answer: 1,
                    explanation: '7=4+2+1(rwx), 5=4+1(rx), 所以755=rwxr-xr-x'
                }
            },
            {
                name: 'chown',
                description: '修改文件所有者',
                category: 'system',
                usage: 'chown [所有者:组] 文件',
                details: '修改文件或目录的所有者和所属组。',
                examples: [
                    { command: 'chown user file.txt', output: '将文件所有者改为user' },
                    { command: 'chown user:group file.txt', output: '同时修改所有者和组' },
                    { command: 'chown -R user:group dir/', output: '递归修改目录及其内容' }
                ],
                quiz: {
                    question: '如何同时修改文件的所有者和所属组？',
                    options: ['chown user file', 'chown user.group file', 'chown user:group file', 'chown --user user --group group file'],
                    answer: 2,
                    explanation: '使用冒号分隔所有者和组：chown user:group file'
                }
            },
            {
                name: 'useradd',
                description: '创建用户',
                category: 'system',
                usage: 'useradd [选项] 用户名',
                details: '创建新的系统用户。通常需要root权限。',
                examples: [
                    { command: 'useradd newuser', output: '创建新用户newuser' },
                    { command: 'useradd -m newuser', output: '创建用户并创建主目录' },
                    { command: 'useradd -s /bin/bash newuser', output: '指定登录shell' },
                    { command: 'useradd -G wheel newuser', output: '将用户添加到wheel组' }
                ],
                quiz: {
                    question: '创建用户时自动创建主目录需要哪个参数？',
                    options: ['-d', '-m', '-h', '-home'],
                    answer: 1,
                    explanation: '-m 参数表示创建用户主目录(mkdir)'
                }
            },
            {
                name: 'userdel',
                description: '删除用户',
                category: 'system',
                usage: 'userdel [选项] 用户名',
                details: '删除系统用户。使用 -r 参数同时删除用户主目录。',
                examples: [
                    { command: 'userdel olduser', output: '删除用户olduser' },
                    { command: 'userdel -r olduser', output: '删除用户并移除主目录' }
                ],
                quiz: {
                    question: '删除用户时同时删除其主目录需要哪个参数？',
                    options: ['-f', '-r', '-d', '-remove'],
                    answer: 1,
                    explanation: '-r 参数表示同时删除用户主目录'
                }
            },
            {
                name: 'groupadd',
                description: '创建用户组',
                category: 'system',
                usage: 'groupadd [选项] 组名',
                details: '创建新的用户组。RHCSA考试重点。',
                examples: [
                    { command: 'groupadd developers', output: '创建developers组' },
                    { command: 'groupadd -g 10000 devops', output: '指定GID创建组' }
                ],
                quiz: {
                    question: '创建用户组的命令是？',
                    options: ['useradd', 'groupadd', 'addgroup', 'create-group'],
                    answer: 1,
                    explanation: 'groupadd 用于创建用户组'
                }
            },
            {
                name: 'groupdel',
                description: '删除用户组',
                category: 'system',
                usage: 'groupdel 组名',
                details: '删除指定的用户组。',
                examples: [
                    { command: 'groupdel developers', output: '删除developers组' }
                ],
                quiz: {
                    question: '删除用户组的命令是？',
                    options: ['userdel', 'groupdel', 'delgroup', 'remove-group'],
                    answer: 1,
                    explanation: 'groupdel 用于删除用户组'
                }
            },
            {
                name: 'passwd',
                description: '设置用户密码',
                category: 'system',
                usage: 'passwd [选项] [用户名]',
                details: '设置或修改用户密码。RHCSA考试重点。',
                examples: [
                    { command: 'passwd user1', output: '修改user1的密码' },
                    { command: 'passwd -l user1', output: '锁定用户账户' },
                    { command: 'passwd -u user1', output: '解锁用户账户' },
                    { command: 'passwd -d user1', output: '清除用户密码' }
                ],
                quiz: {
                    question: '锁定用户账户需要哪个参数？',
                    options: ['-l', '-lock', '-disable', '-d'],

                    { command: 'touch file.txt', output: '创建空文件' },
                    { command: 'touch file1.txt file2.txt', output: '同时创建多个文件' },
                    { command: 'touch -t 202401010000 file.txt', output: '设置文件时间戳' }
                ],
                quiz: {
                    question: '创建空文件使用哪个命令？',
                    options: ['touch', 'cat >', 'echo "" >', '以上都可以'],
                    answer: 3,
                    explanation: '三种方式都可以创建空文件'
                }
            },
            {
                name: 'diff',
                description: '比较文件',
                category: 'files',
                usage: 'diff [选项] 文件1 文件2',
                details: '比较两个文件的差异。',
                examples: [
                    { command: 'diff file1.txt file2.txt', output: '比较两个文件' },
                    { command: 'diff -u file1.txt file2.txt', output: '统一格式输出' },
                    { command: 'diff -r dir1 dir2', output: '递归比较目录' },
                    { command: 'diff --help', output: '查看帮助' }
                ],
                quiz: {
                    question: '以统一格式比较文件使用哪个参数？',
                    options: ['-u', '-c', '-d', '--unified'],
                    answer: 0,
                    explanation: '-u 参数生成统一格式的diff输出'
                }
            },
            {
                name: 'rsync',
                description: '同步文件',
                category: 'network',
                usage: 'rsync [选项] 源 目标',
                details: '高效的文件同步工具，支持增量同步。',
                examples: [
                    { command: 'rsync -av source/ dest/', output: '同步目录' },
                    { command: 'rsync -avz user@host:/path/ /local/path/', output: '远程同步' },
                    { command: 'rsync -av --delete source/ dest/', output: '同步并删除多余文件' },
                    { command: 'rsync -avP source/ dest/', output: '显示进度' }
                ],
                quiz: {
                    question: 'rsync常用参数组合是？',
                    options: ['-av', '-copy', '-sync', '-transfer'],
                    answer: 0,
                    explanation: '-a 归档模式，-v 详细输出'
                }
            },
            {
                name: 'tmux',
                description: '终端复用',
                category: 'tools',
                usage: 'tmux [命令]',
                details: '终端复用器，允许在单个窗口中管理多个终端会话。',
                examples: [
                    { command: 'tmux', output: '启动tmux' },
                    { command: 'tmux new -s session', output: '创建命名会话' },
                    { command: 'tmux attach -t session', output: '连接会话' },
                    { command: 'Ctrl+b %', output: '垂直分割窗口' }
                ],
                quiz: {
                    question: 'tmux的默认前缀键是什么？',
                    options: ['Ctrl+a', 'Ctrl+b', 'Ctrl+t', 'Ctrl+x'],
                    answer: 1,
                    explanation: 'tmux默认前缀键是Ctrl+b'
                }
            },
            {
                name: 'nohup',
                description: '后台运行',
                category: 'script',
                usage: 'nohup 命令 &',
                details: '使命令在后台运行，即使退出终端也不受影响。',
                examples: [
                    { command: 'nohup ./script.sh &', output: '后台运行脚本' },
                    { command: 'nohup python app.py > output.log &', output: '重定向输出' },
                    { command: 'nohup ./server &>/dev/null &', output: '忽略输出' }
                ],
                quiz: {
                    question: '让命令在后台运行的符号是？',
                    options: ['&', '&&', '||', ';'],
                    answer: 0,
                    explanation: '& 符号将命令放入后台运行'
                }
            },
            {
                name: 'id',
                description: '用户信息',
                category: 'system',
                usage: 'id [选项] [用户名]',
                details: '显示用户和组的ID信息。',
                examples: [
                    { command: 'id', output: '显示当前用户信息' },
                    { command: 'id username', output: '显示指定用户信息' },
                    { command: 'id -u', output: '只显示UID' },
                    { command: 'id -g', output: '只显示GID' }
                ],
                quiz: {
                    question: '只显示用户ID使用哪个参数？',
                    options: ['-u', '-uid', '-user', '--id'],
                    answer: 0,
                    explanation: '-u 参数只显示用户ID(UID)'
                }
            },
            {
                name: 'uptime',
                description: '运行时间',
                category: 'system',
                usage: 'uptime',
                details: '显示系统运行时间和平均负载。',
                examples: [
                    { command: 'uptime', output: '显示运行时间' },
                    { command: 'uptime -p', output: '友好格式显示' },
                    { command: 'uptime -s', output: '显示启动时间' }
                ],
                quiz: {
                    question: '显示系统启动时间使用哪个参数？',
                    options: ['-s', '-start', '-boot', '-b'],
                    answer: 0,
                    explanation: '-s 参数显示系统启动时间(start time)'
                }
            },
            {
                name: 'cal',
                description: '日历',
                category: 'tools',
                usage: 'cal [选项] [月份] [年份]',
                details: '显示日历。',
                examples: [
                    { command: 'cal', output: '显示当月日历' },
                    { command: 'cal 2024', output: '显示全年日历' },
                    { command: 'cal 12 2024', output: '显示指定月份' },
                    { command: 'cal -3', output: '显示前后三个月' }
                ],
                quiz: {
                    question: '显示全年日历使用哪个命令？',
                    options: ['cal 年份', 'cal -y', 'cal --year', '以上都可以'],
                    answer: 3,
                    explanation: '多种方式都可以显示全年日历'
                }
            }
        ];

        const searchBar = document.getElementById('searchBar');
        const categoryTabs = document.getElementById('categoryTabs');
        const commandGrid = document.getElementById('commandGrid');
        const commandModal = document.getElementById('commandModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');
        const favoriteBtn = document.getElementById('favoriteBtn');
        const totalCommands = document.getElementById('totalCommands');
        const favCount = document.getElementById('favCount');
        const quizScore = document.getElementById('quizScore');
        
        let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
        let score = parseInt(localStorage.getItem('quizScore') || '0');
        
        function renderCommands(filter = '', category = 'all') {
            const filtered = commands.filter(cmd => {
                const matchesSearch = cmd.name.toLowerCase().includes(filter.toLowerCase()) ||
                                    cmd.description.toLowerCase().includes(filter.toLowerCase());
                const matchesCategory = category === 'all' || cmd.category === category;
                return matchesSearch && matchesCategory;
            });
            
            commandGrid.innerHTML = '';
            filtered.forEach(cmd => {
                const card = document.createElement('div');
                card.className = 'command-card';
                card.innerHTML = `
                    <div class="name">${cmd.name}</div>
                    <div class="desc">${cmd.description}</div>
                    <div class="tags">
                        <span class="tag">${getCategoryName(cmd.category)}</span>
                    </div>
                `;
                card.onclick = () => openModal(cmd);
                commandGrid.appendChild(card);
            });
            
            totalCommands.textContent = commands.length;
            favCount.textContent = favorites.length;
            quizScore.textContent = score;
        }
        
        function getCategoryName(category) {
            const names = {
                'files': '文件操作',
                'system': '系统管理',
                'network': '网络管理',
                'process': '进程管理',
                'package': '软件包管理',
                'script': '脚本编程',
                'tools': '工具命令',
                'compress': '压缩工具'
            };
            return names[category] || category;
        }
        
        function openModal(cmd) {
            modalTitle.textContent = cmd.name;
            favoriteBtn.textContent = favorites.includes(cmd.name) ? '⭐' : '☆';
            favoriteBtn.dataset.command = cmd.name;
            
            let html = `
                <div class="section">
                    <div class="section-title">描述</div>
                    <div class="description">${cmd.details}</div>
                </div>
                <div class="section">
                    <div class="section-title">用法</div>
                    <div class="usage">${cmd.usage}</div>
                </div>
                <div class="section">
                    <div class="section-title">示例</div>
            `;
            
            cmd.examples.forEach(ex => {
                html += `
                    <div class="example">
                        <span class="prompt">$</span> <span class="command">${ex.command}</span>
                        <div class="output">${ex.output}</div>
                    </div>
                `;
            });
            
            html += `
                </div>
                <div class="quiz-section">
                    <div class="section-title">小测验</div>
                    <div class="quiz-question">${cmd.quiz.question}</div>
                    <div class="quiz-options" id="quizOptions">
            `;
            
            cmd.quiz.options.forEach((opt, idx) => {
                html += `<div class="quiz-option" data-index="${idx}">${opt}</div>`;
            });
            
            html += `
                    </div>
                    <div class="quiz-feedback" id="quizFeedback"></div>
                </div>
            `;
            
            modalBody.innerHTML = html;
            commandModal.classList.add('active');
            
            document.querySelectorAll('.quiz-option').forEach(opt => {
                opt.onclick = () => checkAnswer(cmd, parseInt(opt.dataset.index));
            });
        }
        
        function checkAnswer(cmd, selectedIndex) {
            const options = document.querySelectorAll('.quiz-option');
            const feedback = document.getElementById('quizFeedback');
            
            options.forEach((opt, idx) => {
                opt.style.pointerEvents = 'none';
                if (idx === cmd.quiz.answer) {
                    opt.classList.add('correct');
                } else if (idx === selectedIndex && idx !== cmd.quiz.answer) {
                    opt.classList.add('wrong');
                }
            });
            
            if (selectedIndex === cmd.quiz.answer) {
                feedback.textContent = `✅ 正确！${cmd.quiz.explanation}`;
                feedback.className = 'quiz-feedback correct';
                score += 10;
                localStorage.setItem('quizScore', score.toString());
                quizScore.textContent = score;
            } else {
                feedback.textContent = `❌ 错误！正确答案是: ${cmd.quiz.options[cmd.quiz.answer]}\n${cmd.quiz.explanation}`;
                feedback.className = 'quiz-feedback wrong';
            }
        }
        
        function closeModal() {
            commandModal.classList.remove('active');
        }
        
        function toggleFavorite() {
            const cmdName = favoriteBtn.dataset.command;
            if (favorites.includes(cmdName)) {
                favorites = favorites.filter(f => f !== cmdName);
                favoriteBtn.textContent = '☆';
            } else {
                favorites.push(cmdName);
                favoriteBtn.textContent = '⭐';
            }
            localStorage.setItem('favorites', JSON.stringify(favorites));
            favCount.textContent = favorites.length;
        }
        
        searchBar.addEventListener('input', (e) => {
            const activeTab = document.querySelector('.tab.active');
            renderCommands(e.target.value, activeTab.dataset.category);
        });
        
        categoryTabs.addEventListener('click', (e) => {
            if (e.target.classList.contains('tab')) {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                renderCommands(searchBar.value, e.target.dataset.category);
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
        
        renderCommands();
    </script>
</body>
</html>
